<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tambah Material — SAP Material Master (Lite)</title>
  static/styles.css
  <style>
    /* Tambahan gaya ringan untuk form */
    .wrap { max-width: 980px; margin: 16px auto; background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:16px; }
    h1{margin:0 0 12px;}
    form{display:grid; grid-template-columns: repeat(12,1fr); gap:12px;}
    label{font-size:12px; color:#555; display:block; margin-bottom:4px;}
    input, textarea, select{width:100%; padding:10px 12px; border:1px solid #d0d8e1; border-radius:8px; font:14px system-ui, Segoe UI, Roboto, Arial, sans-serif;}
    .col-6{grid-column: span 6;}
    .col-4{grid-column: span 4;}
    .col-3{grid-column: span 3;}
    .col-12{grid-column: span 12;}
    .actions{display:flex; gap:8px; margin-top:8px;}
    .btn{padding:10px 14px; border:1px solid #cfe6ff; background:#eef6ff; color:#0356a6; border-radius:8px; cursor:pointer;}
    .btn.primary{background:#0356a6; color:#fff; border-color:#0356a6;}
    .note{font-size:12px; color:#667;}
    .preview{background:#0b1220; color:#e6edf3; padding:12px; border-radius:8px; overflow:auto; max-height:340px;}
    .ok{color:#157347;}
    .warn{color:#a15f00;}
    .err{color:#b42318;}
    a.back{display:inline-block; margin-bottom:12px; color:#0356a6;}
  </style>
</head>
<body>
  <header style="background:#014a78;color:#fff;padding:12px 16px;">
    <strong>Tambah Material</strong>
  </header>

  <main class="wrap">
    <a class="i ke daftar</a>
    <p class="note">Isi form di bawah lalu klik <b>Preview</b> untuk melihat JSON. Jika sudah benar, klik <b>Gabungkan & Unduh materials.json</b>, lalu upload file itu ke repo kamu untuk memperbarui data.</p>

    <form id="f">
      <div class="col-3">
        <label>Material *</label>
        <input required name="material" placeholder="mis. 15551163" />
      </div>
      <div class="col-9">
        <label>Short text *</label>
        <input required name="short_text" placeholder="Ringkasan material" />
      </div>

      <div class="col-3">
        <label>Plant</label>
        <input name="plant" placeholder="mis. VMB3" />
      </div>
      <div class="col-3">
        <label>Storage Location</label>
        <input name="storage_location" placeholder="mis. W103" />
      </div>
      <div class="col-3">
        <label>Material Type</label>
        <input name="material_type" placeholder="mis. ELEC" />
      </div>
      <div class="col-3">
        <label>UoM *</label>
        <input required name="uom" placeholder="mis. KG / PCS" />
      </div>

      <div class="col-6">
        <label>Manufacturer</label>
        <input name="manufacturer" placeholder="Nama pabrikan" />
      </div>
      <div class="col-6">
        <label>Manufacturer Part Number</label>
        <input name="mfr_part_number" placeholder="Nomor part pabrikan" />
      </div>

      <div class="col-4">
        <label>Average Unit Price</label>
        <input name="avg_unit_price" type="number" step="0.01" placeholder="mis. 81.61" />
      </div>
      <div class="col-4">
        <label>Purchasing Group</label>
        <input name="purchasing_group" placeholder="mis. Purch.Grp A" />
      </div>
      <div class="col-4">
        <label>Last Update</label>
        <input name="last_update" placeholder="otomatis jika kosong" />
      </div>

      <div class="col-4">
        <label>Stock Type</label>
        <input name="stock_type" placeholder="mis. CRITICALITY B" />
      </div>
      <div class="col-4">
        <label>Stock Class</label>
        <input name="stock_class" placeholder="mis. STOCKABLE / NON STOCKABLE" />
      </div>
      <div class="col-4">
        <label>Qualifier 1</label>
        <input name="qualifier_code1" placeholder="mis. Vendor Held Stock" />
      </div>
      <div class="col-12">
        <label>Qualifier 2</label>
        <input name="qualifier_code2" />
      </div>

      <div class="col-12">
        <label>PO Long Text</label>
        <textarea name="po_long_text" rows="4" placeholder="Deskripsi panjang / spesifikasi PO"></textarea>
      </div>

      <div class="col-12">
        <label class="note"><input type="checkbox" id="replaceIfExists" /> Ganti data jika Material sudah ada (overwrite)</label>
      </div>

      <div class="col-12 actions">
        <button type="button" class="btn" id="btnPreview">Preview JSON</button>
        <button type="button" class="btn primary" id="btnDownload">Gabungkan & Unduh materials.json</button>
        <button type="button" class="btn" id="btnCopy">Copy JSON</button>
      </div>
    </form>

    <div id="msg" class="note" style="margin:8px 0 12px;"></div>
    <pre id="preview" class="preview"></pre>
  </main>

  <footer style="padding:12px 16px;color:#667;">© 2026 — Tool tambah material (statis).</footer>

  static/add.js</script>
</body>
</html>
